---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
    fail_msg: "This role currently supports Debian-family Linux targets only."

- name: Install APT dependencies
  ansible.builtin.apt:
    name: "{{ ludus_panda_apt_packages }}"
    state: present
    update_cache: true
  when: ludus_panda_install_dependencies

- name: Ensure PANDA install directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ ludus_panda_install_dir }}"
    - "{{ ludus_panda_bin_dir }}"

- name: Download PANDA release archive
  ansible.builtin.get_url:
    url: "{{ ludus_panda_release_url }}"
    dest: "/tmp/panda-{{ ludus_panda_version }}-linux-{{ ludus_panda_arch }}.tar.gz"
    mode: "0644"

- name: Extract PANDA archive
  ansible.builtin.unarchive:
    src: "/tmp/panda-{{ ludus_panda_version }}-linux-{{ ludus_panda_arch }}.tar.gz"
    dest: "{{ ludus_panda_install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1

- name: Ensure PANDA profile script is present
  ansible.builtin.template:
    src: panda.sh.j2
    dest: /etc/profile.d/panda.sh
    owner: root
    group: root
    mode: "0644"

- name: Install pandare python package
  ansible.builtin.pip:
    name: "{{ ludus_panda_pandare_package }}"
    state: present
  when: ludus_panda_install_pandare
