---
# PANDA release version to install.
# - Set to "latest" to query GitHub for the newest release tag.
# - Set to an explicit release tag (for example: "v0.0.0") for deterministic installs.
ludus_panda_version: "latest"

# CPU architecture suffix used by PANDA release assets.
# Valid values generally include amd64 and arm64.
ludus_panda_arch: "amd64"

# GitHub API endpoint used to resolve latest PANDA release metadata.
ludus_panda_github_latest_api: "https://api.github.com/repos/panda-re/panda/releases/latest"

# Installation path for PANDA binaries.
ludus_panda_install_dir: "/opt/panda"

# Directory exposed on PATH via profile script.
ludus_panda_bin_dir: "{{ ludus_panda_install_dir }}/bin"

# Whether to install build/runtime dependencies.
ludus_panda_install_dependencies: true

# Additional apt dependencies for PANDA runtime and common tooling.
ludus_panda_apt_packages:
  - curl
  - tar
  - ca-certificates
  - python3
  - python3-pip

# Whether to install pandare (Python bindings).
ludus_panda_install_pandare: true

# pip package spec for pandare.
ludus_panda_pandare_package: "pandare"

# If set, verify downloaded archive integrity with this checksum value.
# Format: "sha256:<hex>"
ludus_panda_archive_checksum: ""
